<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명지 패스트오더 - 가타쯔무리</title>
</head>
<body>
<h1><strong>명지 패스트오더 - 가타쯔무리</strong></h1>


<form id="orderForm">


<input type="text" placeholder="주문자명" required><br>


<input type="text" placeholder="tH" required><br>


<input type="text" placeholder="요청사항"><br><br>
<label>


메뉴 선택


<select name="menu" id="mainSelect">


<option value="없음">없음</option>


<option value="가케우동">가케우동</option>

<option value="붓카게우동">붓카게무동</option>


<option value="유자우동">유자우동</option>


<option value="가마타마우동">가마타마우동</option>


<option value="스다치우동">스다치우동</option>


</select>


</label>


<br><br>
<label>



메뉴 선택 (곱배기)


<select name="menu" id="mainLargeSelect">


<option value="없음">없음</option>


<option value="가케우동">가케무동</option>


<option value="붓카게우동">붓카게무동</option>


<option value="유자우돌">유자우동</option>


<option value="가마타마우동">가마타마우동</option>


<option value="스다치우동">스다치우동</option>


</select>


</label>


<br><br>
<label>


국물 추가


<select name="broth" id="brothSelect">


<option value="없음">없음</option>


<option value="가케우동">가케무동</option>


<option value="붓카게우동">붓카게우동</option>


</select>


</label>


<br><br>
사이드 선택


<br>


없음 <input type="checkbox" name="side" value="없음"><br>


시오다래 돼지<input type="checkbox" name="side" value="시오다래 돼지"><br>


반숙계란<input type="checkbox" name="side" value="반숙계란"><br>


유부조림(기쯔네)<input type="checkbox" name="side" value="유부조림(기쯔네)"><br>


미역귀절임<input type="checkbox" name="side" value="미역귀절임"><br>


공기밥<input type="checkbox" name="side" value="공기밥"><br><br>
<button type="submit">주문하기</button>


</form>


</body>


</html>
